<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WiFi Marketing - Logging in...</title>
    
    <!-- MIKROTIK CONTEXT INJECTION: Essential for Multi-tenant identification -->
    <script>
      window.MIKROTIK_CONTEXT = {
        mac: "$(mac)", // Infrastructure Identity
        hostname: "$(hostname)", // Router Identity (Used for brand mapping)
        ip: "$(ip)",
        linkOrig: "$(link-orig)", // Original requested URL
        isLoggedIn: "$(if-login-done)" === "yes", // Authorized state detection
        error: "$(error)"
      };
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
